<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A_パレットリビルド - Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <header class="page-header">
    <div>
      <h1>A_パレットリビルド</h1>
      <p class="sub">登録済みサイトの状況（ルール数・有効数・最終更新）を一覧表示します。</p>
    </div>
    <div class="actions">
      <button id="btnExport" type="button">エクスポート</button>

      <label class="import-btn">
        <input id="fileImport" type="file" accept="application/json" hidden />
        <span class="btnlike">インポート</span>
      </label>

      <button id="btnRefresh" type="button">再読み込み</button>
    </div>
  </header>

  <section class="panel">
    <div class="panel-head">
      <div>
        <h2>サイト別 無効化（A_パレットリビルド）</h2>
        <p class="panel-sub">登録したホストではパネルを表示せず機能も停止します。</p>
      </div>
    </div>

    <div class="blocklist-controls">
      <label class="blocklist-input">
        <span>ホスト名</span>
        <input id="blockHostInput" type="text" placeholder="example.com" />
      </label>
      <button id="blockHostAdd" class="btn" type="button">追加</button>
      <div id="blockHostError" class="form-error" role="status" aria-live="polite"></div>
    </div>

    <label class="checkbox-row">
      <input id="blockIncludeSubdomains" type="checkbox" />
      <span>サブドメインも無効化</span>
    </label>

    <div class="blocklist-box">
      <div class="blocklist-head">
        <span>登録済みホスト</span>
        <span id="blocklistCount" class="muted">0件</span>
      </div>
      <ul id="blocklistItems" class="blocklist-items"></ul>
      <div id="blocklistEmpty" class="empty" hidden>未登録です。</div>
    </div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <label class="search">
        <span>検索</span>
        <input id="q" type="text" placeholder="host で絞り込み（例: tv.example.com）" />
      </label>
      <div class="meta">
        <span id="stats">-</span>
      </div>
    </div>

    <div id="empty" class="empty" hidden>
      まだルールが登録されていません。
    </div>

    <div class="table-wrap">
      <table id="sitesTable" class="sites" hidden>
        <thead>
          <tr>
            <th>サイト</th>
            <th class="num">ルール数</th>
            <th class="num">有効</th>
            <th class="num">リスト</th>
            <th>最終更新</th>
            <th class="num">詳細</th>
          </tr>
        </thead>
        <tbody id="sitesTbody"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="options.js"></script>
</body>
</html>
